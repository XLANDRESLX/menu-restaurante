<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Menú Digital</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<style>
:root {
  --primary:#ff6b00; --primary-h:#ff8c35; --primary-pale:#fff0e6; --primary-deep:#c94e00;
  --dark:#111111; --mid:#555555; --light:#ffffff;
  --surface:#f7f6f3; --border:#e9e8e3;
  --success:#16a34a; --danger:#dc2626;
  --radius:22px; --radius-sm:14px; --radius-xs:10px;
  --shadow-sm:0 2px 8px rgba(0,0,0,0.05);
  --shadow-md:0 8px 28px rgba(0,0,0,0.09);
  --shadow-lg:0 24px 64px rgba(0,0,0,0.14);
  --shadow-orange:0 8px 28px rgba(255,107,0,0.3);
}
*,*::before,*::after{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--surface);margin:0;padding-bottom:110px;color:var(--dark)}

/* HEADER */
.site-header{background:var(--dark);color:white;position:relative;overflow:hidden}
.hbg{position:absolute;border-radius:50%;background:var(--primary);opacity:.1;pointer-events:none}
.header-inner{position:relative;z-index:1;max-width:720px;margin:0 auto;padding:44px 22px 32px}
.hbadge{display:inline-block;background:rgba(255,107,0,.18);color:#ff8c35;font-size:.72rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:5px 12px;border-radius:20px;margin-bottom:12px}
#empresa{font-family:'Syne',sans-serif;font-size:clamp(1.7rem,5.5vw,3rem);font-weight:800;margin:0 0 6px;letter-spacing:-.03em;line-height:1.05}
#lugar{font-size:.9rem;opacity:.5;margin:0 0 22px;display:flex;align-items:center;gap:6px}
.btn-wa{display:inline-flex;align-items:center;gap:8px;background:var(--success);color:white;padding:11px 20px;border-radius:50px;text-decoration:none;font-weight:600;font-size:.88rem;transition:opacity .2s,transform .2s}
.btn-wa:hover{opacity:.9;transform:translateY(-1px)}
.btn-wa svg{width:17px;height:17px;fill:white;flex-shrink:0}

/* LAYOUT */
.page-wrapper{max-width:720px;margin:0 auto;padding:0 14px}

/* SEARCH */
.search-wrap{padding:18px 0 6px}
.search-box{display:flex;align-items:center;gap:10px;background:white;border:1.5px solid var(--border);border-radius:50px;padding:0 18px;box-shadow:var(--shadow-sm);transition:border-color .2s}
.search-box:focus-within{border-color:var(--primary)}
.search-box svg{width:17px;height:17px;fill:none;stroke:var(--mid);stroke-width:2;flex-shrink:0}
.search-box input{flex:1;border:none;outline:none;padding:13px 0;font-family:'DM Sans',sans-serif;font-size:.92rem;background:transparent;color:var(--dark)}
.search-box input::placeholder{color:#aaa}
.search-clear{background:none;border:none;cursor:pointer;padding:4px;color:#aaa;font-size:1.1rem;display:none;line-height:1}

/* TABS */
.tabs-wrap{position:sticky;top:0;z-index:100;background:var(--surface);padding:10px 0 8px}
.tabs-scroll{display:flex;gap:7px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;padding-bottom:2px}
.tabs-scroll::-webkit-scrollbar{display:none}
.tab-btn{padding:8px 18px;border-radius:50px;border:1.5px solid var(--border);background:white;color:var(--mid);font-family:'Syne',sans-serif;font-size:.78rem;font-weight:700;white-space:nowrap;cursor:pointer;transition:all .2s;letter-spacing:.04em;text-transform:uppercase}
.tab-btn.active{background:var(--dark);border-color:var(--dark);color:white}

/* SECTION */
.cat-section{margin-top:28px}
.cat-title{font-family:'Syne',sans-serif;font-size:1rem;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--dark);margin:0 0 14px;display:flex;align-items:center;gap:10px}
.cat-count{background:var(--primary);color:white;padding:1px 9px;border-radius:20px;font-size:.68rem;font-weight:700}

/* GRID */
.menu-grid{display:grid;grid-template-columns:1fr;gap:11px}
@media(min-width:560px){.menu-grid{grid-template-columns:1fr 1fr}}
@media(min-width:860px){.menu-grid{grid-template-columns:1fr 1fr 1fr}}

/* CARD */
.menu-card{background:white;border-radius:var(--radius);overflow:hidden;border:1.5px solid var(--border);box-shadow:var(--shadow-sm);display:flex;flex-direction:column;transition:box-shadow .2s,transform .2s,opacity .2s;animation:fadeUp .35s ease both}
.menu-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px)}
.menu-card.hidden{display:none}
.menu-card.agotado{opacity:.52;pointer-events:none}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

.card-img-wrap{width:100%;aspect-ratio:16/9;overflow:hidden;background:var(--surface);position:relative}
.card-img-wrap img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .35s ease}
.menu-card:hover .card-img-wrap img{transform:scale(1.04)}
.card-img-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:2.4rem;background:linear-gradient(135deg,#f0ede8,#e8e4dc)}
.badge-agotado{position:absolute;top:10px;left:10px;background:var(--danger);color:white;font-family:'Syne',sans-serif;font-size:.68rem;font-weight:700;padding:4px 10px;border-radius:20px;letter-spacing:.05em;text-transform:uppercase;z-index:1}

.card-body{padding:15px 16px 16px;display:flex;flex-direction:column;gap:10px;flex:1}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.card-name{font-family:'Syne',sans-serif;font-size:.97rem;font-weight:700;margin:0 0 4px;line-height:1.25;text-transform:capitalize}
.card-desc{margin:0;font-size:.8rem;color:var(--mid);line-height:1.5}
.card-price{background:var(--primary-pale);color:var(--primary);padding:7px 12px;border-radius:var(--radius-xs);font-family:'Syne',sans-serif;font-size:.92rem;font-weight:800;white-space:nowrap;flex-shrink:0}

.card-actions{margin-top:auto}
.btn-add{width:100%;padding:10px 14px;background:var(--primary);color:white;border:none;border-radius:var(--radius-xs);font-family:'Syne',sans-serif;font-size:.82rem;font-weight:700;letter-spacing:.04em;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:background .15s,transform .1s}
.btn-add:hover{background:var(--primary-h)}
.btn-add:active{transform:scale(.97)}
.qty-controls{display:flex;align-items:center;gap:8px;width:100%}
.qty-btn{width:36px;height:36px;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-xs);font-size:1.1rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--dark);transition:background .15s,border-color .15s;flex-shrink:0}
.qty-btn:hover{background:var(--border)}
.qty-btn.minus:hover{border-color:var(--danger);color:var(--danger)}
.qty-btn.plus{background:var(--primary);border-color:var(--primary);color:white;margin-left:auto}
.qty-btn.plus:hover{background:var(--primary-h);border-color:var(--primary-h)}
.qty-num{font-family:'Syne',sans-serif;font-weight:800;font-size:1rem;min-width:24px;text-align:center}
.qty-subtotal{font-size:.78rem;color:var(--mid);white-space:nowrap;font-weight:500}

/* FAB */
#cart-fab{position:fixed;bottom:22px;right:16px;z-index:900;background:var(--primary);color:white;border:none;border-radius:var(--radius);padding:13px 20px;font-family:'Syne',sans-serif;font-size:.9rem;font-weight:700;cursor:pointer;box-shadow:var(--shadow-orange);display:flex;align-items:center;gap:10px;letter-spacing:.02em;transition:transform .2s,opacity .3s}
#cart-fab:hover{transform:scale(1.04)}
#cart-fab.hide{opacity:0;pointer-events:none;transform:translateY(16px)}
.fab-icon{font-size:1.1rem}
.fab-badge{background:white;color:var(--primary);border-radius:20px;padding:2px 9px;font-size:.82rem;font-weight:800;min-width:28px;text-align:center}

/* OVERLAY */
#cart-overlay{position:fixed;inset:0;background:rgba(0,0,0,.48);z-index:1000;opacity:0;pointer-events:none;transition:opacity .3s;backdrop-filter:blur(3px)}
#cart-overlay.open{opacity:1;pointer-events:all}

/* DRAWER */
#cart-drawer{position:fixed;bottom:0;left:0;right:0;z-index:1100;background:white;border-radius:28px 28px 0 0;max-height:88vh;overflow-y:auto;transform:translateY(100%);transition:transform .34s cubic-bezier(.32,.72,0,1);box-shadow:var(--shadow-lg)}
#cart-drawer.open{transform:translateY(0)}
@media(min-width:560px){#cart-drawer{left:50%;right:auto;width:460px;transform:translateX(-50%) translateY(100%)}#cart-drawer.open{transform:translateX(-50%) translateY(0)}}

.drawer-handle{width:38px;height:4px;background:var(--border);border-radius:2px;margin:14px auto 0}
.drawer-head{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.drawer-head h2{font-family:'Syne',sans-serif;font-size:1.15rem;font-weight:800;margin:0}
.drawer-close{width:34px;height:34px;background:var(--surface);border:none;border-radius:var(--radius-xs);cursor:pointer;font-size:.95rem;color:var(--mid);transition:background .15s}
.drawer-close:hover{background:var(--border)}

.customer-field{padding:14px 20px 0}
.field-label{display:block;font-size:.78rem;font-weight:600;color:var(--mid);margin-bottom:6px;text-transform:uppercase;letter-spacing:.06em}
.field-input{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:var(--radius-xs);font-family:'DM Sans',sans-serif;font-size:.92rem;color:var(--dark);background:var(--surface);outline:none;transition:border-color .2s}
.field-input:focus{border-color:var(--primary);background:white}
.field-input::placeholder{color:#bbb}

.cart-items-wrap{padding:12px 20px;display:flex;flex-direction:column;gap:9px}
.cart-row{background:var(--surface);border-radius:var(--radius-sm);padding:13px 14px;display:flex;align-items:center;gap:12px}
.cart-thumb{width:48px;height:48px;border-radius:var(--radius-xs);object-fit:cover;flex-shrink:0;background:var(--border)}
.cart-thumb-ph{width:48px;height:48px;border-radius:var(--radius-xs);background:var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:1.3rem}
.cart-row-info{flex:1;min-width:0}
.cart-row-info strong{display:block;font-family:'Syne',sans-serif;font-size:.88rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-transform:capitalize}
.cart-row-info span{font-size:.76rem;color:var(--mid)}
.cart-row-controls{display:flex;align-items:center;gap:7px;flex-shrink:0}
.mini-btn{width:28px;height:28px;background:white;border:1.5px solid var(--border);border-radius:8px;font-size:1rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--dark);transition:all .15s}
.mini-btn:hover{border-color:var(--primary);color:var(--primary)}
.mini-btn.del:hover{border-color:var(--danger);color:var(--danger)}
.mini-num{font-family:'Syne',sans-serif;font-weight:800;font-size:.9rem;min-width:20px;text-align:center}
.cart-row-price{font-family:'Syne',sans-serif;font-weight:700;font-size:.88rem;color:var(--primary);white-space:nowrap;flex-shrink:0}

.notes-field{padding:0 20px 4px}
.notes-ta{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:var(--radius-xs);font-family:'DM Sans',sans-serif;font-size:.88rem;color:var(--dark);background:var(--surface);outline:none;resize:none;height:76px;transition:border-color .2s;line-height:1.5}
.notes-ta:focus{border-color:var(--primary);background:white}
.notes-ta::placeholder{color:#bbb}

.cart-summary{padding:14px 20px 20px;border-top:1px solid var(--border)}
.total-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.total-label{font-size:.88rem;color:var(--mid);font-weight:500}
.total-val{font-family:'Syne',sans-serif;font-size:1.45rem;font-weight:800}
.btn-send-wa{width:100%;padding:15px;background:var(--success);color:white;border:none;border-radius:var(--radius-sm);font-family:'Syne',sans-serif;font-size:.95rem;font-weight:700;letter-spacing:.03em;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:opacity .2s,transform .2s}
.btn-send-wa:hover{opacity:.9;transform:translateY(-1px)}
.btn-send-wa svg{width:20px;height:20px;fill:white}
.btn-clear{width:100%;margin-top:9px;padding:11px;background:none;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:'Syne',sans-serif;font-size:.82rem;font-weight:700;color:var(--mid);cursor:pointer;transition:border-color .2s,color .2s}
.btn-clear:hover{border-color:var(--danger);color:var(--danger)}

.cart-empty{text-align:center;padding:44px 20px;color:var(--mid)}
.cart-empty .icon{font-size:2.8rem;margin-bottom:12px}
.cart-empty p{font-size:.9rem;margin:0;line-height:1.6}

/* LOADING */
#loading{text-align:center;padding:80px 20px;color:var(--mid)}
.loader{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .75s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}

.no-results{text-align:center;padding:50px 20px;color:var(--mid);display:none}

/* TOAST */
#toast{position:fixed;bottom:86px;left:50%;transform:translateX(-50%) translateY(14px);background:var(--dark);color:white;padding:9px 18px;border-radius:50px;font-size:.82rem;font-weight:600;opacity:0;transition:opacity .25s,transform .25s;z-index:2000;white-space:nowrap;pointer-events:none}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<header class="site-header">
  <div class="hbg" style="width:300px;height:300px;top:-120px;right:-80px"></div>
  <div class="hbg" style="width:180px;height:180px;bottom:-90px;left:-50px"></div>
  <div class="header-inner">
    <div class="hbadge">Menú Digital</div>
    <h1 id="empresa">Cargando...</h1>
    <p id="lugar"></p>
    <a id="telefonoBtn" class="btn-wa" href="#" target="_blank">
      <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
      Contactar por WhatsApp
    </a>
  </div>
</header>

<div class="page-wrapper">
  <div class="search-wrap">
    <div class="search-box">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35" stroke-linecap="round"/></svg>
      <input type="text" id="search-input" placeholder="Buscar en el menú..." oninput="onSearch(this.value)">
      <button class="search-clear" id="search-clear" onclick="clearSearch()">✕</button>
    </div>
  </div>
  <div class="tabs-wrap"><div class="tabs-scroll" id="tabs-scroll"></div></div>
  <div id="loading"><div class="loader"></div>Cargando menú...</div>
  <div id="no-results" class="no-results">
    <div style="font-size:2.5rem;margin-bottom:12px">🔍</div>
    <p>No se encontraron productos.<br>Intenta con otro término.</p>
  </div>
  <div id="menu-container"></div>
</div>

<button id="cart-fab" class="hide" onclick="openCart()">
  <span class="fab-icon">🛒</span> Ver pedido
  <span class="fab-badge" id="fab-count">0</span>
</button>

<div id="cart-overlay" onclick="closeCart()"></div>
<div id="cart-drawer">
  <div class="drawer-handle"></div>
  <div class="drawer-head">
    <h2>Tu pedido 🧾</h2>
    <button class="drawer-close" onclick="closeCart()">✕</button>
  </div>
  <div id="cart-content"></div>
</div>

<div id="toast"></div>

<script>
const SHEET_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vQS1P9jB5HnKtkHZCeWtqlrPGeMWtgwAWIT4G6jux79_PMSdLf7v5_i7ZFz38TBiqv7lcsCmK1Edxu0/pub?output=csv";

const EMOJI={salchipapa:'🍟',pizza:'🍕',hamburguesa:'🍔','perro caliente':'🌭',mazorcada:'🌽',patacon:'🫓','arepa rellena':'🫔',bebidas:'🥤',default:'🍽️'};
const emo=c=>EMOJI[c.toLowerCase()]||EMOJI.default;

let phone="";
let cart={};
try{cart=JSON.parse(localStorage.getItem('menu_cart')||'{}')}catch(_){}
let customerName=localStorage.getItem('menu_customer')||'';

function saveCart(){try{localStorage.setItem('menu_cart',JSON.stringify(cart))}catch(_){}}
function fmt(n){return new Intl.NumberFormat('es-CO',{style:'currency',currency:'COP',maximumFractionDigits:0}).format(n)}

let toastTid;
function toast(m){const e=document.getElementById('toast');e.textContent=m;e.classList.add('show');clearTimeout(toastTid);toastTid=setTimeout(()=>e.classList.remove('show'),2000)}

function cartQty(){return Object.values(cart).reduce((s,i)=>s+i.qty,0)}
function cartTotal(){return Object.values(cart).reduce((s,i)=>s+i.price*i.qty,0)}
function updateFab(){const q=cartQty();document.getElementById('fab-count').textContent=q;document.getElementById('cart-fab').classList.toggle('hide',q===0)}

function setQty(id,name,price,image,delta){
  if(!cart[id])cart[id]={name,price,image,qty:0};
  cart[id].qty=Math.max(0,cart[id].qty+delta);
  if(cart[id].qty===0)delete cart[id];
  saveCart();
  const qty=cart[id]?cart[id].qty:0;
  document.querySelectorAll('[data-item="'+id+'"]').forEach(w=>{
    const ab=w.querySelector('.btn-add'),qc=w.querySelector('.qty-controls'),qn=w.querySelector('.qty-num'),qs=w.querySelector('.qty-subtotal');
    if(ab)ab.style.display=qty>0?'none':'';
    if(qc)qc.style.display=qty>0?'flex':'none';
    if(qn)qn.textContent=qty;
    if(qs)qs.textContent=qty>0?fmt(price*qty):'';
  });
  updateFab();
  if(delta>0)toast('✓ '+name+' agregado');
  if(document.getElementById('cart-drawer').classList.contains('open'))renderCart();
}

function openCart(){renderCart();document.getElementById('cart-overlay').classList.add('open');document.getElementById('cart-drawer').classList.add('open');document.body.style.overflow='hidden'}
function closeCart(){document.getElementById('cart-overlay').classList.remove('open');document.getElementById('cart-drawer').classList.remove('open');document.body.style.overflow=''}

function renderCart(){
  const el=document.getElementById('cart-content');
  const items=Object.entries(cart);
  if(!items.length){
    el.innerHTML='<div class="cart-empty"><div class="icon">🛒</div><p>Tu pedido está vacío.<br>Agrega algo del menú.</p></div>';
    return;
  }
  const savedNotes=document.getElementById('notes-ta')?document.getElementById('notes-ta').value:(localStorage.getItem('menu_notes')||'');
  let h=`<div class="customer-field">
    <label class="field-label">¿Cuál es tu nombre?</label>
    <input class="field-input" type="text" id="customer-in" placeholder="Ej: Juan García" value="${eh(customerName)}" oninput="customerName=this.value;localStorage.setItem('menu_customer',this.value)">
  </div>
  <div class="cart-items-wrap">`;
  items.forEach(([id,item])=>{
    const img=item.image?`<img class="cart-thumb" src="${eh(item.image)}" alt="${eh(item.name)}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`:'';
    const ph=`<div class="cart-thumb-ph" ${item.image?'style="display:none"':''}>${emo(item.name)}</div>`;
    h+=`<div class="cart-row">${img}${ph}
      <div class="cart-row-info"><strong>${eh(item.name)}</strong><span>${fmt(item.price)} c/u</span></div>
      <div class="cart-row-controls">
        <button class="mini-btn del" onclick="setQty('${id}','${ej(item.name)}',${item.price},'${ej(item.image||'')}', -1)">−</button>
        <span class="mini-num">${item.qty}</span>
        <button class="mini-btn" onclick="setQty('${id}','${ej(item.name)}',${item.price},'${ej(item.image||'')}', +1)">+</button>
      </div>
      <div class="cart-row-price">${fmt(item.price*item.qty)}</div>
    </div>`;
  });
  h+=`</div>
  <div class="notes-field">
    <label class="field-label">Notas del pedido (opcional)</label>
    <textarea class="notes-ta" id="notes-ta" placeholder="Ej: sin cebolla, para llevar..." oninput="localStorage.setItem('menu_notes',this.value)">${eh(savedNotes)}</textarea>
  </div>
  <div class="cart-summary">
    <div class="total-row"><span class="total-label">Total del pedido</span><span class="total-val">${fmt(cartTotal())}</span></div>
    <button class="btn-send-wa" onclick="sendWA()">
      <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
      Enviar pedido por WhatsApp
    </button>
    <button class="btn-clear" onclick="clearCart()">🗑 Vaciar pedido</button>
  </div>`;
  el.innerHTML=h;
}

function clearCart(){
  cart={};saveCart();localStorage.removeItem('menu_notes');updateFab();
  document.querySelectorAll('[data-item]').forEach(w=>{
    const ab=w.querySelector('.btn-add'),qc=w.querySelector('.qty-controls');
    if(ab)ab.style.display='';if(qc)qc.style.display='none';
  });
  closeCart();toast('Pedido vaciado');
}

function sendWA(){
  const items=Object.values(cart);
  if(!items.length)return;
  const name=(document.getElementById('customer-in')?.value||customerName||'').trim();
  const notes=(document.getElementById('notes-ta')?.value||'').trim();
  let msg=name?`👤 *Pedido de ${name}*\n`:`🛒 *Nuevo Pedido*\n`;
  msg+='─────────────────\n';
  items.forEach(i=>msg+=`• ${i.qty}x ${i.name.charAt(0).toUpperCase()+i.name.slice(1)} — ${fmt(i.price*i.qty)}\n`);
  msg+='─────────────────\n';
  msg+=`💰 *Total: ${fmt(cartTotal())}*`;
  if(notes)msg+=`\n\n📝 *Notas:* ${notes}`;
  window.open(phone?`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`:`https://wa.me/?text=${encodeURIComponent(msg)}`,'_blank');
}

function onSearch(v){
  const q=v.trim().toLowerCase();
  document.getElementById('search-clear').style.display=q?'block':'none';
  let total=0;
  document.querySelectorAll('.menu-card').forEach(c=>{
    const match=!q||(c.dataset.name||'').includes(q)||(c.dataset.desc||'').includes(q)||(c.dataset.cat||'').includes(q);
    c.classList.toggle('hidden',!match);
    if(match)total++;
  });
  document.querySelectorAll('.cat-section').forEach(s=>{
    s.style.display=s.querySelectorAll('.menu-card:not(.hidden)').length?'':'none';
  });
  document.getElementById('no-results').style.display=total===0?'block':'none';
}
function clearSearch(){document.getElementById('search-input').value='';document.getElementById('search-clear').style.display='none';onSearch('')}

function eh(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function ej(s){return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'")}

async function init(){
  try{
    const res=await fetch(SHEET_URL);
    const csv=await res.text();
    const rows=Papa.parse(csv,{header:true,skipEmptyLines:true}).data;
    if(!rows.length)return;
    const info=rows[0];
    document.getElementById('empresa').textContent=info.Empresa||'Mi Restaurante';
    document.getElementById('lugar').textContent='📍 '+(info.Lugar||'');
    document.title=info.Empresa||'Menú Digital';
    phone=(info.Telefono||'').replace(/\D/g,'');
    if(phone)document.getElementById('telefonoBtn').href='https://wa.me/'+phone;
    const groups={};
    rows.forEach((row,idx)=>{
      const cat=(row.Categoria||'General').trim();
      if(!groups[cat])groups[cat]=[];
      groups[cat].push({
        id:String(row.ID||idx),
        name:(row.Nombre||'Producto').trim(),
        price:parseInt(row.precio)||0,
        desc:(row.Descripcion||'').trim(),
        image:(row.Imagen||'').trim(),
        available:(row.Disponible||'S').trim().toUpperCase()!=='N'
      });
    });
    renderMenu(groups);
    updateFab();
  }catch(e){
    console.error(e);
    document.getElementById('loading').innerHTML='⚠️ Error al cargar el menú. Recarga la página.';
  }
}

function renderMenu(groups){
  const container=document.getElementById('menu-container');
  const tabsScroll=document.getElementById('tabs-scroll');
  document.getElementById('loading').style.display='none';
  container.innerHTML='';tabsScroll.innerHTML='';
  const cats=Object.keys(groups);
  cats.forEach((cat,ci)=>{
    const tab=document.createElement('button');
    tab.className='tab-btn'+(ci===0?' active':'');
    tab.innerHTML=emo(cat)+' '+cat;
    tab.onclick=()=>{
      document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById('sec-'+ci)?.scrollIntoView({behavior:'smooth',block:'start'});
    };
    tabsScroll.appendChild(tab);
    const sec=document.createElement('section');
    sec.className='cat-section';sec.id='sec-'+ci;
    sec.innerHTML=`<h2 class="cat-title">${emo(cat)} ${cat} <span class="cat-count">${groups[cat].length}</span></h2>`;
    const grid=document.createElement('div');
    grid.className='menu-grid';
    groups[cat].forEach((p,pi)=>{
      const qty=cart[p.id]?cart[p.id].qty:0;
      const card=document.createElement('div');
      card.className='menu-card'+(p.available?'':' agotado');
      card.style.animationDelay=Math.min(pi*.06,.5)+'s';
      card.dataset.item=p.id;card.dataset.name=p.name.toLowerCase();
      card.dataset.desc=p.desc.toLowerCase();card.dataset.cat=cat.toLowerCase();
      const imgHtml=p.image
        ?`<div class="card-img-wrap">${!p.available?'<span class="badge-agotado">Agotado</span>':''}<img src="${eh(p.image)}" alt="${eh(p.name)}" loading="lazy" onerror="this.parentElement.querySelector('.card-img-placeholder')&&(this.style.display='none');var ph=this.parentElement.querySelector('.card-img-ph');if(ph)ph.style.display='flex'"><div class="card-img-ph card-img-placeholder" style="display:none">${emo(cat)}</div></div>`
        :`<div class="card-img-wrap">${!p.available?'<span class="badge-agotado">Agotado</span>':''}<div class="card-img-placeholder">${emo(cat)}</div></div>`;
      const actHtml=p.available
        ?`<div class="card-actions" data-item="${eh(p.id)}">
            <button class="btn-add" style="${qty>0?'display:none':''}\" onclick="setQty('${ej(p.id)}','${ej(p.name)}',${p.price},'${ej(p.image)}',1)">+ Agregar</button>
            <div class="qty-controls" style="${qty>0?'display:flex':'display:none'};align-items:center;gap:8px;width:100%">
              <button class="qty-btn minus" onclick="setQty('${ej(p.id)}','${ej(p.name)}',${p.price},'${ej(p.image)}',-1)">−</button>
              <span class="qty-num">${qty}</span>
              <span class="qty-subtotal">${qty>0?fmt(p.price*qty):''}</span>
              <button class="qty-btn plus" onclick="setQty('${ej(p.id)}','${ej(p.name)}',${p.price},'${ej(p.image)}',1)">+</button>
            </div>
          </div>`
        :`<div style="text-align:center;font-size:.8rem;color:var(--danger);font-weight:600;padding:8px 0">No disponible</div>`;
      card.innerHTML=`${imgHtml}
        <div class="card-body">
          <div class="card-top">
            <div><h3 class="card-name">${eh(p.name)}</h3>${p.desc?`<p class="card-desc">${eh(p.desc)}</p>`:''}</div>
            <div class="card-price">${fmt(p.price)}</div>
          </div>
          ${actHtml}
        </div>`;
      grid.appendChild(card);
    });
    sec.appendChild(grid);container.appendChild(sec);
  });
  const sections=container.querySelectorAll('.cat-section');
  const tabs=tabsScroll.querySelectorAll('.tab-btn');
  const obs=new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      if(e.isIntersecting){
        const idx=e.target.id.replace('sec-','');
        tabs.forEach((t,i)=>{t.classList.toggle('active',String(i)===idx);if(String(i)===idx)t.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'})});
      }
    });
  },{threshold:.35});
  sections.forEach(s=>obs.observe(s));
}

window.onload=init;
</script>
</body>
</html>
