<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Carta Digital</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --card: #222222;
    --accent: #f5a623;
    --accent2: #e8441a;
    --text: #f0ece4;
    --muted: #888;
    --nav-h: 72px;
    --radius: 20px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: calc(var(--nav-h) + 20px);
  }

  /* ── PORTADA ── */
  #portada {
    position: relative;
    min-height: 100svh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    overflow: hidden;
    padding: 40px 20px 100px;
  }
  #portada::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 60% 30%, #e8441a33 0%, transparent 60%),
                radial-gradient(ellipse at 30% 80%, #f5a62322 0%, transparent 55%);
    z-index: 0;
  }
  .cover-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(3rem, 10vw, 7rem);
    line-height: 1;
    letter-spacing: 2px;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    position: relative; z-index: 1;
    text-shadow: none;
    filter: drop-shadow(0 4px 24px #f5a62355);
    animation: fadeUp .8s ease both;
  }
  .cover-sub {
    font-size: clamp(.9rem, 3vw, 1.2rem);
    color: var(--muted);
    margin-top: 8px;
    letter-spacing: 4px;
    text-transform: uppercase;
    position: relative; z-index: 1;
    animation: fadeUp .8s .15s ease both;
  }
  .cover-divider {
    width: 60px; height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px;
    margin: 24px auto;
    position: relative; z-index: 1;
    animation: fadeUp .8s .25s ease both;
  }
  .cover-info {
    position: relative; z-index: 1;
    animation: fadeUp .8s .35s ease both;
    display: flex; flex-direction: column; gap: 10px; align-items: center;
  }
  .cover-lugar {
    font-size: .95rem; color: var(--muted);
    display: flex; align-items: center; gap: 6px;
  }
  .wa-btn {
    display: inline-flex; align-items: center; gap: 10px;
    background: #25D366;
    color: #fff;
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 1rem;
    padding: 14px 28px;
    border-radius: 50px;
    text-decoration: none;
    margin-top: 10px;
    box-shadow: 0 8px 32px #25d36640;
    transition: transform .2s, box-shadow .2s;
  }
  .wa-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 40px #25d36660; }
  .wa-icon { width: 22px; height: 22px; }
  .cover-scroll {
    position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%);
    color: var(--muted); font-size: .8rem; letter-spacing: 2px;
    text-transform: uppercase; z-index: 1;
    animation: bounce 2s infinite;
  }
  @keyframes bounce { 0%,100%{transform:translateX(-50%) translateY(0)} 50%{transform:translateX(-50%) translateY(8px)} }
  @keyframes fadeUp { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }

  /* ── LOADING ── */
  #loading {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 16px; padding: 60px 20px;
    min-height: 40vh;
  }
  .spinner {
    width: 48px; height: 48px;
    border: 4px solid #333;
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to{transform:rotate(360deg)} }

  /* ── MENÚ ── */
  #menu { padding: 32px 16px 20px; max-width: 900px; margin: 0 auto; }
  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem; letter-spacing: 2px;
    color: var(--accent);
    margin-bottom: 20px;
    padding-left: 4px;
    border-left: 4px solid var(--accent2);
    padding-left: 12px;
  }
  .products-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px;
    margin-bottom: 40px;
  }
  .product-card {
    background: var(--card);
    border-radius: var(--radius);
    overflow: hidden;
    border: 1px solid #2a2a2a;
    transition: transform .2s, box-shadow .2s;
    display: flex; flex-direction: column;
  }
  .product-card:hover { transform: translateY(-4px); box-shadow: 0 12px 40px #0006; }
  .product-img {
    width: 100%; height: 160px; object-fit: cover;
    background: #1e1e1e;
    display: flex; align-items: center; justify-content: center;
    font-size: 3rem; color: #333;
  }
  .product-img img { width: 100%; height: 100%; object-fit: cover; }
  .product-body { padding: 14px; flex: 1; display: flex; flex-direction: column; gap: 6px; }
  .product-name {
    font-weight: 800; font-size: 1rem; text-transform: capitalize;
    color: var(--text);
  }
  .product-desc { font-size: .82rem; color: var(--muted); line-height: 1.5; flex: 1; }
  .product-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; }
  .product-price {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem; letter-spacing: 1px;
    color: var(--accent);
  }
  .add-btn {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none; border-radius: 50px;
    color: #fff; font-weight: 800; font-size: .85rem;
    padding: 8px 16px; cursor: pointer;
    transition: opacity .2s, transform .2s;
  }
  .add-btn:hover { opacity: .85; transform: scale(1.05); }

  /* ── NAVBAR BOTTOM ── */
  #navbar {
    position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 4px;
    background: #1a1a1aee;
    backdrop-filter: blur(16px);
    border-radius: 50px;
    padding: 8px;
    border: 1px solid #2a2a2a;
    z-index: 100;
    max-width: calc(100vw - 32px);
    overflow-x: auto;
    scrollbar-width: none;
    box-shadow: 0 8px 40px #000a;
  }
  #navbar::-webkit-scrollbar { display: none; }
  .nav-item {
    flex-shrink: 0;
    padding: 8px 16px;
    border-radius: 50px;
    font-weight: 700; font-size: .82rem;
    cursor: pointer;
    color: var(--muted);
    transition: background .2s, color .2s;
    white-space: nowrap;
    border: none; background: transparent;
  }
  .nav-item.active, .nav-item:hover {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
  }
  .nav-cart-btn {
    flex-shrink: 0;
    display: flex; align-items: center; gap: 6px;
    padding: 8px 16px;
    border-radius: 50px;
    font-weight: 800; font-size: .82rem;
    cursor: pointer;
    background: #25D366;
    color: #fff;
    border: none;
    position: relative;
    transition: opacity .2s;
  }
  .nav-cart-btn:hover { opacity: .85; }
  .cart-badge {
    position: absolute; top: 2px; right: 4px;
    background: #e8441a; color: #fff;
    border-radius: 50%; width: 18px; height: 18px;
    font-size: .7rem; font-weight: 800;
    display: flex; align-items: center; justify-content: center;
    display: none;
  }

  /* ── CARRITO MODAL ── */
  #cart-overlay {
    position: fixed; inset: 0;
    background: #000c;
    z-index: 200;
    display: none;
    align-items: flex-end;
  }
  #cart-overlay.open { display: flex; }
  #cart-panel {
    width: 100%; max-width: 540px;
    margin: 0 auto;
    background: var(--surface);
    border-radius: 28px 28px 0 0;
    padding: 24px 20px 32px;
    max-height: 90svh;
    overflow-y: auto;
    animation: slideUp .3s ease;
  }
  @keyframes slideUp { from{transform:translateY(40px);opacity:0} to{transform:translateY(0);opacity:1} }
  .cart-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .cart-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; letter-spacing: 2px; color: var(--accent); }
  .close-btn {
    background: #2a2a2a; border: none; color: var(--text);
    width: 36px; height: 36px; border-radius: 50%; font-size: 1.2rem;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
  }
  .cart-items { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
  .cart-item {
    background: var(--card);
    border-radius: 14px; padding: 12px;
    display: flex; align-items: flex-start; gap: 10px;
  }
  .cart-item-info { flex: 1; }
  .cart-item-name { font-weight: 800; font-size: .95rem; text-transform: capitalize; }
  .cart-item-note {
    font-size: .78rem; color: var(--muted); margin-top: 2px;
    font-style: italic;
  }
  .cart-item-price { color: var(--accent); font-weight: 800; font-size: .95rem; white-space: nowrap; }
  .cart-item-controls { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
  .qty-btn {
    background: #333; border: none; color: var(--text);
    width: 28px; height: 28px; border-radius: 50%; font-size: 1rem;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: background .15s;
  }
  .qty-btn:hover { background: var(--accent); }
  .qty-val { font-weight: 800; min-width: 20px; text-align: center; }
  .cart-item-note-input {
    width: 100%; margin-top: 8px;
    background: #1a1a1a; border: 1px solid #333; border-radius: 8px;
    padding: 6px 10px; color: var(--text); font-size: .8rem; font-family: 'Nunito', sans-serif;
  }
  .cart-item-note-input::placeholder { color: #555; }
  .remove-btn {
    background: none; border: none; color: #e8441a; cursor: pointer; font-size: 1.1rem;
    padding: 2px 6px;
  }

  /* Formulario pedido */
  .form-section { margin-top: 16px; display: flex; flex-direction: column; gap: 12px; }
  .form-label { font-weight: 700; font-size: .85rem; color: var(--muted); margin-bottom: 4px; display: block; }
  .form-input, .form-select {
    width: 100%; padding: 12px 14px;
    background: var(--card); border: 1px solid #333; border-radius: 12px;
    color: var(--text); font-family: 'Nunito', sans-serif; font-size: .95rem;
    outline: none; transition: border .2s;
  }
  .form-input:focus, .form-select:focus { border-color: var(--accent); }
  .form-select option { background: var(--card); }
  .cart-total {
    display: flex; justify-content: space-between; align-items: center;
    padding: 16px 0; border-top: 1px solid #2a2a2a; margin-top: 8px;
  }
  .total-label { font-weight: 700; color: var(--muted); }
  .total-val { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; color: var(--accent); }
  .send-btn {
    width: 100%; padding: 16px;
    background: #25D366;
    border: none; border-radius: 50px;
    color: #fff; font-family: 'Bebas Neue', sans-serif;
    font-size: 1.3rem; letter-spacing: 2px;
    cursor: pointer; margin-top: 8px;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    transition: opacity .2s, transform .2s;
  }
  .send-btn:hover { opacity: .9; transform: scale(1.01); }
  .empty-cart { text-align: center; padding: 40px 20px; color: var(--muted); }
  .empty-cart .emoji { font-size: 3rem; display: block; margin-bottom: 12px; }

  /* toast */
  #toast {
    position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
    background: var(--accent); color: #0f0f0f;
    padding: 10px 24px; border-radius: 50px;
    font-weight: 800; font-size: .9rem;
    z-index: 300; opacity: 0; pointer-events: none;
    transition: opacity .3s;
  }
  #toast.show { opacity: 1; }

  @media(max-width:480px) {
    .products-grid { grid-template-columns: 1fr 1fr; }
    .product-img { height: 120px; }
  }
  @media(max-width:340px) {
    .products-grid { grid-template-columns: 1fr; }
  }
</style>
</head>

<script>
// ── CONFIGURACIÓN ──
// Reemplaza esta URL con tu Google Sheet publicada como CSV
// Archivo → Compartir → Publicar en la web → Hoja → CSV
const SHEET_URL = 'https://docs.google.com/spreadsheets/d/TU_ID_AQUI/pub?output=csv';

// Emoji fallback por categoría
const CAT_EMOJI = {
  salchipapa: '🍟', pizza: '🍕', hamburguesa: '🍔',
  'perro caliente': '🌭', bebida: '🥤', bebidas: '🥤',
  postre: '🍰', postres: '🍰', default: '🍽️'
};

let menuData = {};
let empresa = {};
let cart = [];
let activeSection = null;

// ── FETCH CSV ──
async function loadMenu() {
  try {
    // Para demo: datos embebidos (reemplaza con fetch real)
    const demoCSV = `ID\tEmpresa\tCategoria\tNombre\tprecio\tDescripcion\tImagen\tLugar\tTelefono\testado
1\tCOMIDA RAPIDA ANDRES\tsalchipapa\tsencilla\t20000\tpapas a la francesa, salchichas, queso, lechuga, papi perro\t\tCIENAGA, MAGDALENA CALLE 32\t3169183313\t
2\tCOMIDA RAPIDA ANDRES\tPizza\tsencilla\t12000\tmasa artesanal, salsa de tomate, queso mozzarella\t\t\t\t
3\tCOMIDA RAPIDA ANDRES\tsalchipapa\tpollo ranchera\t25000\tpapas a la francesa, salchichas ranchera, queso, lechuga, papi perro, pollo\t\t\t\t
4\tCOMIDA RAPIDA ANDRES\tHamburguesa\tsencilla\t15000\tpan de Hamburguesa, pollo o carne\t\t\t\t
5\tCOMIDA RAPIDA ANDRES\tsalchipapa\tespecial\t28000\tpapas a la francesa, salchicha ranchera, pollo desmechado, queso, lechuga, salsa especial\t\t\t\t
6\tCOMIDA RAPIDA ANDRES\tsalchipapa\tmixta\t30000\tpapas a la francesa, salchicha, chorizo, pollo, queso, salsas\t\t\t\t
7\tCOMIDA RAPIDA ANDRES\tsalchipapa\tsuper especial\t35000\tpapas a la francesa, salchicha, chorizo, pollo, carne, queso doble, salsas\t\t\t\t
8\tCOMIDA RAPIDA ANDRES\tPizza\tpepperoni\t18000\tmasa artesanal, salsa de tomate, queso mozzarella, pepperoni\t\t\t\t
9\tCOMIDA RAPIDA ANDRES\tPizza\thawaiiana\t20000\tmasa artesanal, salsa de tomate, queso mozzarella, jamon, piña\t\t\t\t
10\tCOMIDA RAPIDA ANDRES\tPizza\tpollo champiñon\t22000\tmasa artesanal, salsa de tomate, pollo, champiñones, queso mozzarella\t\t\t\t
11\tCOMIDA RAPIDA ANDRES\tPizza\tcarnes\t25000\tmasa artesanal, salsa de tomate, carne molida, jamon, pepperoni, queso\t\t\t\t
12\tCOMIDA RAPIDA ANDRES\tHamburguesa\tdoble carne\t20000\tpan hamburguesa, doble carne, queso, lechuga, tomate, salsas\t\t\t\t
13\tCOMIDA RAPIDA ANDRES\tHamburguesa\tpollo crispy\t19000\tpan hamburguesa, pollo apanado, queso, lechuga, tomate, salsas\t\t\t\t
14\tCOMIDA RAPIDA ANDRES\tHamburguesa\tespecial\t23000\tpan hamburguesa, carne, jamon, queso, huevo, lechuga, tomate, salsas\t\t\t\t
15\tCOMIDA RAPIDA ANDRES\tHamburguesa\tmixta\t25000\tpan hamburguesa, carne, pollo, queso, lechuga, tomate, salsas\t\t\t\t
16\tCOMIDA RAPIDA ANDRES\tPerro Caliente\tsencillo\t9000\tpan perro, salchicha, papitas, queso, salsas\t\t\t\t
17\tCOMIDA RAPIDA ANDRES\tPerro Caliente\tespecial\t12000\tpan perro, salchicha, queso, tocineta, papitas, salsas\t\t\t\t
18\tCOMIDA RAPIDA ANDRES\tPerro Caliente\tranchero\t14000\tpan perro, salchicha ranchera, queso, papitas, salsas\t\t\t\t`;

    // Si tienes la URL real, descomenta estas líneas y borra demoCSV:
    // const res = await fetch(SHEET_URL);
    // const raw = await res.text();
    // parseCSV(raw);

    parseCSV(demoCSV);
  } catch(e) {
    document.getElementById('loading').innerHTML =
      '<p style="color:#e8441a">Error cargando el menú. Verifica la URL del CSV.</p>';
  }
}

function parseCSV(raw) {
  const lines = raw.trim().split('\n');
  const headers = lines[0].split('\t').map(h => h.trim().toLowerCase());

  const get = (row, col) => {
    const i = headers.indexOf(col);
    return i >= 0 ? (row[i] || '').trim() : '';
  };

  menuData = {};

  for (let i = 1; i < lines.length; i++) {
    const row = lines[i].split('\t');
    if (!row[0]) continue;

    const emp   = get(row, 'empresa');
    const cat   = get(row, 'categoria');
    const nom   = get(row, 'nombre');
    const prec  = parseInt(get(row, 'precio')) || 0;
    const desc  = get(row, 'descripcion');
    const img   = get(row, 'imagen');
    const lugar = get(row, 'lugar');
    const tel   = get(row, 'telefono');

    // Primer registro define la empresa
    if (!empresa.nombre) {
      empresa = { nombre: emp, lugar, telefono: tel };
    }

    if (!menuData[cat]) menuData[cat] = [];
    menuData[cat].push({ nombre: nom, precio: prec, descripcion: desc, imagen: img });
  }

  renderPortada();
  renderMenu();
  renderNavbar();
  document.getElementById('loading').style.display = 'none';
  document.getElementById('menu').style.display = 'block';
  document.getElementById('navbar').style.display = 'flex';
}

// ── PORTADA ──
function renderPortada() {
  document.getElementById('cover-nombre').textContent = empresa.nombre || 'Restaurante';
  document.getElementById('lugar-txt').textContent = empresa.lugar || '';
  const tel = empresa.telefono;
  if (tel) {
    const num = tel.replace(/\D/g,'');
    document.getElementById('wa-link').href = `https://wa.me/57${num}`;
  }
  document.title = empresa.nombre || 'Carta Digital';
}

// ── MENÚ ──
function renderMenu() {
  const menu = document.getElementById('menu');
  menu.innerHTML = '';
  const cats = Object.keys(menuData);
  activeSection = cats[0];

  cats.forEach(cat => {
    const section = document.createElement('section');
    section.id = 'cat-' + sanitize(cat);
    section.innerHTML = `<h2 class="section-title">${cap(cat)}</h2>
      <div class="products-grid">${menuData[cat].map(p => productCard(p, cat)).join('')}</div>`;
    menu.appendChild(section);
  });
}

function productCard(p, cat) {
  const emoji = CAT_EMOJI[cat.toLowerCase()] || CAT_EMOJI.default;
  const imgHtml = p.imagen
    ? `<div class="product-img"><img src="${p.imagen}" alt="${p.nombre}" loading="lazy" onerror="this.parentElement.innerHTML='${emoji}'"/></div>`
    : `<div class="product-img">${emoji}</div>`;

  return `<div class="product-card">
    ${imgHtml}
    <div class="product-body">
      <div class="product-name">${p.nombre}</div>
      <div class="product-desc">${p.descripcion || 'Sin descripción'}</div>
      <div class="product-footer">
        <span class="product-price">$${p.precio.toLocaleString('es-CO')}</span>
        <button class="add-btn" onclick='addToCart(${JSON.stringify(p)})'>+ Agregar</button>
      </div>
    </div>
  </div>`;
}

// ── NAVBAR ──
function renderNavbar() {
  const nav = document.getElementById('navbar');
  const cats = Object.keys(menuData);
  const items = cats.map(cat => `
    <button class="nav-item ${cat === activeSection ? 'active' : ''}"
      onclick="scrollTo('${sanitize(cat)}', this)">${cap(cat)}</button>`).join('');
  nav.innerHTML = items + `
    <button class="nav-cart-btn" onclick="openCart()">
      🛒 Pedido
      <span class="cart-badge" id="cart-badge">0</span>
    </button>`;
}

function scrollTo(id, btn) {
  document.getElementById('cat-' + id)?.scrollIntoView({behavior:'smooth', block:'start'});
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
  btn?.classList.add('active');
}

// ── CARRITO ──
function addToCart(product) {
  const existing = cart.find(i => i.nombre === product.nombre);
  if (existing) { existing.qty++; }
  else { cart.push({...product, qty: 1, nota: ''}); }
  updateBadge();
  showToast(`✓ ${cap(product.nombre)} agregado`);
}

function updateBadge() {
  const total = cart.reduce((s, i) => s + i.qty, 0);
  const badge = document.getElementById('cart-badge');
  if (badge) { badge.textContent = total; badge.style.display = total > 0 ? 'flex' : 'none'; }
}

function openCart() {
  document.getElementById('cart-overlay').classList.add('open');
  renderCart();
}
function closeCart() {
  document.getElementById('cart-overlay').classList.remove('open');
}
document.getElementById('cart-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('cart-overlay')) closeCart();
});

function renderCart() {
  const cont = document.getElementById('cart-content');
  if (cart.length === 0) {
    cont.innerHTML = `<div class="empty-cart"><span class="emoji">🛒</span>Tu carrito está vacío.<br>¡Agrega algo rico!</div>`;
    return;
  }

  const total = cart.reduce((s, i) => s + i.precio * i.qty, 0);

  cont.innerHTML = `
    <div class="cart-items" id="cart-items-list">${cart.map((item, idx) => cartItem(item, idx)).join('')}</div>
    <div class="form-section">
      <div>
        <label class="form-label">👤 Nombre del cliente</label>
        <input class="form-input" id="cliente-nombre" placeholder="Tu nombre completo" />
      </div>
      <div>
        <label class="form-label">💳 Método de pago</label>
        <select class="form-select" id="metodo-pago">
          <option value="">Selecciona método</option>
          <option>Efectivo</option>
          <option>Transferencia</option>
          <option>Nequi</option>
          <option>Daviplata</option>
          <option>Tarjeta</option>
        </select>
      </div>
    </div>
    <div class="cart-total">
      <span class="total-label">Total</span>
      <span class="total-val">$${total.toLocaleString('es-CO')}</span>
    </div>
    <button class="send-btn" onclick="sendOrder()">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.123.554 4.116 1.526 5.845L.057 23.619a.75.75 0 00.908.928l5.938-1.553A11.943 11.943 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.75a9.73 9.73 0 01-4.953-1.352l-.355-.21-3.676.961.981-3.584-.231-.369A9.722 9.722 0 012.25 12C2.25 6.615 6.615 2.25 12 2.25S21.75 6.615 21.75 12 17.385 21.75 12 21.75z"/></svg>
      Enviar Pedido
    </button>`;
}

function cartItem(item, idx) {
  return `<div class="cart-item">
    <div class="cart-item-info">
      <div class="cart-item-name">${cap(item.nombre)}</div>
      <div class="cart-item-controls">
        <button class="qty-btn" onclick="changeQty(${idx}, -1)">−</button>
        <span class="qty-val">${item.qty}</span>
        <button class="qty-btn" onclick="changeQty(${idx}, 1)">+</button>
        <span class="cart-item-price">$${(item.precio * item.qty).toLocaleString('es-CO')}</span>
      </div>
      <input class="cart-item-note-input" placeholder="Algo especial? ej: sin cebolla, sencilla sin verdura..."
        value="${item.nota}" oninput="cart[${idx}].nota=this.value" />
    </div>
    <button class="remove-btn" onclick="removeItem(${idx})">🗑</button>
  </div>`;
}

function changeQty(idx, delta) {
  cart[idx].qty += delta;
  if (cart[idx].qty <= 0) cart.splice(idx, 1);
  updateBadge();
  renderCart();
}
function removeItem(idx) {
  cart.splice(idx, 1);
  updateBadge();
  renderCart();
}

function sendOrder() {
  const nombre = document.getElementById('cliente-nombre')?.value.trim();
  const pago   = document.getElementById('metodo-pago')?.value;

  if (!nombre) { showToast('⚠️ Escribe tu nombre'); return; }
  if (!pago)   { showToast('⚠️ Elige método de pago'); return; }
  if (cart.length === 0) { showToast('⚠️ El carrito está vacío'); return; }

  const total = cart.reduce((s, i) => s + i.precio * i.qty, 0);

  let msg = `🍽️ *PEDIDO - ${empresa.nombre}*\n`;
  msg += `👤 *Cliente:* ${nombre}\n`;
  msg += `💳 *Pago:* ${pago}\n\n`;
  msg += `*Productos:*\n`;
  cart.forEach(item => {
    msg += `• ${item.qty}x ${cap(item.nombre)} - $${(item.precio * item.qty).toLocaleString('es-CO')}`;
    if (item.nota) msg += `\n  📝 _${item.nota}_`;
    msg += '\n';
  });
  msg += `\n💰 *Total: $${total.toLocaleString('es-CO')}*`;

  const tel = empresa.telefono?.replace(/\D/g,'');
  const url = `https://wa.me/57${tel}?text=${encodeURIComponent(msg)}`;
  window.open(url, '_blank');
}

// ── UTILS ──
function cap(str) { return str ? str.charAt(0).toUpperCase() + str.slice(1) : ''; }
function sanitize(str) { return str.toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,''); }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// Intersection Observer para activar nav
const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      const id = entry.target.id.replace('cat-','');
      document.querySelectorAll('.nav-item').forEach(b => {
        b.classList.toggle('active', sanitize(b.textContent) === id);
      });
    }
  });
}, { threshold: 0.3 });

// ── INICIO ──
loadMenu().then(() => {
  document.querySelectorAll('[id^="cat-"]').forEach(s => observer.observe(s));
});
</script>
</body>
</html>
