<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Carta Digital</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<section id="portada">
  <div class="cover-logo" id="cover-nombre">Cargando...</div>
  <div class="cover-sub">Carta Digital</div>
  <div class="cover-divider"></div>
  <div class="cover-info">

      <span id="lugar-txt"></span>
    </div>
    <a href="#" id="wa-link" class="wa-btn" target="_blank">
      <svg class="wa-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.123.554 4.116 1.526 5.845L.057 23.619a.75.75 0 00.908.928l5.938-1.553A11.943 11.943 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.75a9.73 9.73 0 01-4.953-1.352l-.355-.21-3.676.961.981-3.584-.231-.369A9.722 9.722 0 012.25 12C2.25 6.615 6.615 2.25 12 2.25S21.75 6.615 21.75 12 17.385 21.75 12 21.75z"/></svg>
      Pedir por WhatsApp
    </a>
  </div>
  <div class="cover-scroll">↓ ver menú</div>
</section>

<div id="loading">
  <div class="spinner"></div>
  <span style="color:var(--muted)">Cargando carta...</span>
</div>

<div id="menu" style="display:none"></div>

<nav id="navbar" style="display:none"></nav>

<div id="cart-overlay">
  <div id="cart-panel">
    <div class="cart-header">
      <span class="cart-title">🛒 Tu Pedido</span>
      <button class="close-btn" onclick="closeCart()">✕</button>
    </div>
    <div id="cart-content"></div>
  </div>
</div>

<div id="toast"></div>

<script src="app.js"></script>
</body>
</html>
